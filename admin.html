<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Top Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0f0f0f;--white:#fafaf8;--gold:#c9a84c;--gold-light:#e8c97a;
  --gray:#2a2a2a;--gray2:#3d3d3d;--gray3:#888;--surface:#1a1a1a;
  --red:#e05252;--green:#52c97a;--radius:10px
}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--surface);border:1px solid #282828;border-radius:16px;padding:2rem;width:100%;max-width:360px}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;text-align:center;margin-bottom:.25rem}
.login-logo span{color:var(--gold)}
.login-sub{text-align:center;font-size:12px;color:var(--gray3);margin-bottom:2rem;letter-spacing:1px;text-transform:uppercase}
.form-group{margin-bottom:1rem}
.form-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray3);display:block;margin-bottom:.375rem}
.form-input{width:100%;padding:.75rem 1rem;background:#111;border:1px solid #282828;border-radius:var(--radius);color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--gold)}
.btn-login{width:100%;padding:.875rem;background:var(--gold);color:var(--black);border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.5rem;transition:background .15s}
.btn-login:hover{background:var(--gold-light)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:.5rem;min-height:16px}

/* APP */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid #222;padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.topbar-logo span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.topbar-user{font-size:12px;color:var(--gray3)}
.btn-logout{background:transparent;border:1px solid #333;color:var(--gray3);padding:.3rem .75rem;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-logout:hover{border-color:#555;color:var(--white)}

/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid #222;padding:.75rem 1.25rem;display:flex;gap:.625rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--gray3);letter-spacing:1px;text-transform:uppercase;margin-right:.25rem}
.filter-btn{background:#111;border:1px solid #282828;color:var(--gray3);padding:.35rem .875rem;border-radius:999px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:#555}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--black);font-weight:500}
.date-input{background:#111;border:1px solid #282828;border-radius:var(--radius);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;padding:.35rem .75rem;outline:none;cursor:pointer}
.date-input:focus{border-color:var(--gold)}
.btn-refresh{background:transparent;border:1px solid #282828;color:var(--gray3);padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-left:auto}
.btn-refresh:hover{border-color:#555;color:var(--white)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.625rem;padding:1rem 1.25rem}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--surface);border:1px solid #222;border-radius:var(--radius);padding:.875rem 1rem}
.stat-label{font-size:11px;color:var(--gray3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:.375rem}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:1px}
.stat-val.gold{color:var(--gold)}

/* TABLE */
.table-wrap{padding:0 1.25rem 2rem;overflow-x:auto}
.table-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray3);margin-bottom:.75rem;font-weight:500}
table{width:100%;border-collapse:collapse;min-width:520px}
th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gray3);padding:.5rem .75rem;border-bottom:1px solid #222;font-weight:500}
td{padding:.625rem .75rem;border-bottom:1px solid #1a1a1a;font-size:13px;vertical-align:middle}
tr:hover td{background:#141414}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.5px}
.badge.confirmado{background:#1a2e1f;color:var(--green);border:1px solid #243b28}
.badge.cancelado{background:#2e1a1a;color:var(--red);border:1px solid #3b2424}
.btn-cancel{background:transparent;border:1px solid #333;color:var(--gray3);padding:.25rem .625rem;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-cancel:hover{border-color:var(--red);color:var(--red)}
.empty-state{text-align:center;padding:3rem;color:var(--gray3);font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.5rem;color:var(--gray3);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);color:var(--white);padding:.75rem 1.25rem;border-radius:var(--radius);font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Timeline view */
.timeline{padding:0 1.25rem 2rem}
.tl-barber{margin-bottom:1.5rem}
.tl-barber-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:.5rem}
.tl-slot{display:flex;gap:.625rem;margin-bottom:.4rem;align-items:center}
.tl-time{font-size:12px;color:var(--gray3);width:44px;flex-shrink:0;text-align:right}
.tl-card{flex:1;background:var(--surface);border:1px solid #222;border-radius:8px;padding:.5rem .75rem;font-size:13px}
.tl-empty{flex:1;height:28px;border:1px dashed #1f1f1f;border-radius:8px}
.view-toggle{display:flex;gap:.375rem;margin-left:.5rem}
.vt-btn{background:#111;border:1px solid #282828;color:var(--gray3);padding:.3rem .625rem;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
.vt-btn.active{background:var(--gold);border-color:var(--gold);color:var(--black)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TOP<span>.</span>STUDIO</div>
    <div class="login-sub">Painel Administrativo</div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="inp-email" placeholder="admin@topstudio.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">TOP<span>.</span>STUDIO</div>
    <div class="topbar-right">
      <span class="topbar-user" id="user-email"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="filters">
    <span class="filter-label">Barbeiro:</span>
    <button class="filter-btn active" onclick="setBarber('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setBarber('André',this)">André</button>
    <button class="filter-btn" onclick="setBarber('Carlos',this)">Carlos</button>
    <button class="filter-btn" onclick="setBarber('Paulo',this)">Paulo</button>
    <input type="date" class="date-input" id="filter-date" onchange="loadData()"/>
    <div class="view-toggle">
      <button class="vt-btn active" id="vt-list" onclick="setView('list')">Lista</button>
      <button class="vt-btn" id="vt-tl" onclick="setView('timeline')">Agenda</button>
    </div>
    <button class="btn-refresh" onclick="loadData()">↺ Atualizar</button>
  </div>

  <div class="stats" id="stats-row">
    <div class="stat-card"><div class="stat-label">Agendamentos</div><div class="stat-val" id="st-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Receita do dia</div><div class="stat-val gold" id="st-revenue">—</div></div>
    <div class="stat-card"><div class="stat-label">Confirmados</div><div class="stat-val" id="st-conf">—</div></div>
    <div class="stat-card"><div class="stat-label">Cancelados</div><div class="stat-val" id="st-canc">—</div></div>
  </div>

  <div id="main-content"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// =============================================
// 🔧 MESMAS CREDENCIAIS DO index.html
// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyB4ji8XbUHMLlrHsESdJJEZLFuOmYm38xQ",
  authDomain: "barbearia-top-studio.firebaseapp.com",
  projectId: "barbearia-top-studio",
  storageBucket: "barbearia-top-studio.appspot.com",
  messagingSenderId: "844120466660",
  appId: "1:844120466660:web:341833ef0e346a2fa7f8f1"
};
// =============================================

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth= getAuth(app);

let allData=[], filterBarber='todos', currentView='list';
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function pad(n){return String(n).padStart(2,'0');}
function fmtPrice(p){return'R$ '+p.toFixed(2).replace('.',',');}
function today(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// AUTH
window.doLogin = async function(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    err.textContent='E-mail ou senha incorretos.';
  }
};
window.doLogout = function(){ signOut(auth); };

onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    document.getElementById('app-screen').style.flexDirection='column';
    document.getElementById('user-email').textContent=user.email;
    document.getElementById('filter-date').value=today();
    loadData();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

// FILTERS
window.setBarber = function(b, btn){
  filterBarber=b;
  document.querySelectorAll('.filters .filter-btn').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  render();
};
window.setView = function(v){
  currentView=v;
  document.getElementById('vt-list').classList.toggle('active',v==='list');
  document.getElementById('vt-tl').classList.toggle('active',v==='timeline');
  render();
};

// LOAD
window.loadData = async function(){
  const dateVal=document.getElementById('filter-date').value || today();
  document.getElementById('main-content').innerHTML='<div class="loading"><div class="spinner"></div> Carregando agendamentos...</div>';
  try{
    const q=query(collection(db,'agendamentos'), where('date','==',dateVal));
    const snap=await getDocs(q);
    allData=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.time>b.time?1:-1);
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="empty-state">Erro ao carregar. Verifique sua conexão.</div>';
  }
};

function getFiltered(){
  if(filterBarber==='todos') return allData;
  return allData.filter(a=>a.barber===filterBarber);
}

function render(){
  const data=getFiltered();
  const conf=data.filter(a=>a.status==='confirmado');
  const canc=data.filter(a=>a.status==='cancelado');
  const revenue=conf.reduce((s,a)=>s+(a.servicePrice||0),0);
  document.getElementById('st-total').textContent=data.length;
  document.getElementById('st-revenue').textContent=fmtPrice(revenue);
  document.getElementById('st-conf').textContent=conf.length;
  document.getElementById('st-canc').textContent=canc.length;
  if(currentView==='timeline') renderTimeline(data);
  else renderList(data);
}

function renderList(data){
  const el=document.getElementById('main-content');
  if(!data.length){el.innerHTML='<div class="empty-state">Nenhum agendamento para este dia.</div>';return;}
  el.innerHTML=`<div class="table-wrap">
    <div class="table-title">Agendamentos</div>
    <table>
      <thead><tr>
        <th>Horário</th><th>Cliente</th><th>WhatsApp</th>
        <th>Serviço</th><th>Barbeiro</th><th>Valor</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${data.map(a=>`
        <tr>
          <td><strong>${a.time}h</strong></td>
          <td>${a.name}</td>
          <td><a href="https://wa.me/55${(a.whats||'').replace(/\D/g,'')}" target="_blank" style="color:var(--gold);text-decoration:none">${a.whats||'—'}</a></td>
          <td>${a.service} <span style="color:var(--gray3);font-size:11px">(${a.serviceDur}min)</span></td>
          <td>${a.barber}</td>
          <td style="font-weight:500">${fmtPrice(a.servicePrice||0)}</td>
          <td><span class="badge ${a.status}">${a.status}</span></td>
          <td>${a.status==='confirmado'?`<button class="btn-cancel" onclick="cancelBooking('${a.id}')">Cancelar</button>`:''}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderTimeline(data){
  const el=document.getElementById('main-content');
  const barbers=filterBarber==='todos'?['André','Carlos','Paulo']:[filterBarber];
  const dateVal=document.getElementById('filter-date').value||today();
  const [y,m,d]=dateVal.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dow=dt.getDay();
  const hours=dow===0?{s:9,e:14}:dow===1?{s:9,e:17}:{s:9,e:20};
  const slots=[];
  for(let t=hours.s*60;t<hours.e*60;t+=30){
    slots.push(pad(Math.floor(t/60))+':'+pad(t%60));
  }
  if(!slots.length){el.innerHTML='<div class="empty-state">Sem expediente neste dia.</div>';return;}
  el.innerHTML='<div class="timeline">'+barbers.map(b=>{
    return`<div class="tl-barber">
      <div class="tl-barber-name">${b}</div>
      ${slots.map(s=>{
        const ag=data.find(a=>a.barber===b&&a.time===s&&a.status==='confirmado');
        return`<div class="tl-slot">
          <div class="tl-time">${s}</div>
          ${ag
            ?`<div class="tl-card"><strong>${ag.name}</strong> · ${ag.service} <span style="color:var(--gray3)">(${ag.serviceDur}min)</span> · <a href="https://wa.me/55${(ag.whats||'').replace(/\D/g,'')}" target="_blank" style="color:var(--gold)">${ag.whats}</a></div>`
            :'<div class="tl-empty"></div>'}
        </div>`;
      }).join('')}
    </div>`;
  }).join('')+'</div>';
}

window.cancelBooking = async function(id){
  if(!confirm('Cancelar este agendamento?')) return;
  try{
    await updateDoc(doc(db,'agendamentos',id),{status:'cancelado'});
    showToast('Agendamento cancelado');
    loadData();
  }catch(e){showToast('Erro ao cancelar.');}
};
</script>
</body>
</html>
